<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小米商城</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    a {
      text-decoration: none;
      color: #333;
    }
    ul {
      list-style: none;
    }

    /* 头部导航 */
    .header {
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 50px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .logo {
      width: 55px;
      height: 55px;
      background: url("https://s01.mifile.cn/i/logo/mi-logo.png") no-repeat center;
      background-size: contain;
    }
    .nav-menu {
      margin-left: 150px;
      display: flex;
      gap: 30px;
      font-size: 16px;
    }
    .nav-menu a:hover {
      color: #ff6700;
    }
    .search-box {
      margin-left: auto;
      width: 280px;
      height: 40px;
      border: 1px solid #e0e0e0;
      display: flex;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 15px;
      font-size: 14px;
    }
    .search-box button {
      width: 40px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-size: 18px;
    }
    .search-box button:hover {
      background: #ff6700;
      color: #fff;
    }

    /* 主体容器 */
    .container {
      width: 1226px;
      margin: 0 auto;
      display: flex;
      margin-top: 10px;
    }

    /* 左侧分类栏 */
    .category-sidebar {
      width: 234px;
      background: rgba(105, 105, 105, 0.8);
      color: #fff;
    }
    .category-item {
      height: 45px;
      line-height: 45px;
      padding: 0 20px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .category-item:hover {
      background: #ff6700;
    }

    /* 轮播图区域 */
    .banner {
      flex: 1;
      margin-left: 14px;
      position: relative;
    }
    .banner img {
      width: 978px;
      height: 460px;
      object-fit: cover;
    }
    .banner-content {
      position: absolute;
      top: 50%;
      left: 100px;
      transform: translateY(-50%);
      color: #333;
    }
    .banner-title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .banner-subtitle {
      font-size: 20px;
      margin-bottom: 30px;
    }
    .banner-btn {
      padding: 12px 35px;
      background: #87ceeb;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
    .banner-dots {
      position: absolute;
      bottom: 20px;
      right: 30px;
      display: flex;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
    }
    .dot.active {
      background: #fff;
    }

    /* 下方功能区 + 商品区 */
    .bottom-section {
      width: 1226px;
      margin: 14px auto 0;
      display: flex;
      gap: 14px;
    }
    .service-grid {
      width: 234px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #5f5f5f;
    }
    .service-item {
      height: 80px;
      background: #666;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 12px;
    }
    .service-item i {
      font-size: 20px;
      margin-bottom: 5px;
    }
    .goods-grid {
      flex: 1;
      display: flex;
      gap: 14px;
    }
    .goods-item {
      flex: 1;
      background: #fff;
      text-align: center;
      padding: 10px;
    }
    .goods-item img {
      width: 100%;
      height: 260px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .goods-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .goods-desc {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <!-- 头部导航 -->
  <div class="header">
    <a href="#" class="logo">
      <img src="https://cdn.cnbj1.fds.api.mi-img.com/mi.com-assets/shop/img/logo-mi2.png" alt="小米Logo" style="width:55px; height:55px;">
    </a>
    <ul class="nav-menu">
      <li><a href="#">Xiaomi手机</a></li>
      <li><a href="#">REDMI手机</a></li>
      <li><a href="#">电视</a></li>
      <li><a href="#">笔记本</a></li>
      <li><a href="#">平板</a></li>
      <li><a href="#">家电</a></li>
      <li><a href="#">路由器</a></li>
      <li><a href="#">服务中心</a></li>
      <li><a href="#">社区</a></li>
    </ul>
    <div class="search-box">
      <input type="text" placeholder="红米">
      <button>🔍</button>
    </div>
  </div>

  <!-- 主体内容 -->
  <div class="container">
    <!-- 左侧分类栏 -->
    <ul class="category-sidebar">
      <li class="category-item">手机 <span>❯</span></li>
      <li class="category-item">电视 <span>❯</span></li>
      <li class="category-item">家电 <span>❯</span></li>
      <li class="category-item">笔记本 平板 显示器 <span>❯</span></li>
      <li class="category-item">出行 穿戴 <span>❯</span></li>
      <li class="category-item">耳机 音箱 <span>❯</span></li>
      <li class="category-item">健康 儿童 <span>❯</span></li>
      <li class="category-item">生活 箱包 <span>❯</span></li>
      <li class="category-item">智能路由器 <span>❯</span></li>
      <li class="category-item">电源 配件 <span>❯</span></li>
    </ul>

    <!-- 轮播图 -->
    <div class="banner">
      <img src="./屏幕截图 2026-03-18 125218.png" alt="Xiaomi Book Pro 14">
      <div class="banner-content">
      </div>
      <div class="banner-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- 下方功能区 + 商品区 -->
  <div class="bottom-section">
    <div class="service-grid">
      <div class="service-item">
        <i>⏱️</i>
        <span>保障服务</span>
      </div>
      <div class="service-item">
        <i>🏢</i>
        <span>企业团购</span>
      </div>
      <div class="service-item">
        <i>℗</i>
        <span>F码通道</span>
      </div>
      <div class="service-item">
        <i>💳</i>
        <span>米粉卡</span>
      </div>
      <div class="service-item">
        <i>🔄</i>
        <span>以旧换新</span>
      </div>
      <div class="service-item">
        <i>¥</i>
        <span>话费充值</span>
      </div>
    </div>

    <div class="goods-grid">
      <div class="goods-item">
        <img src="./屏幕截图 2026-03-18 203723.png" alt="Xiaomi 15系列">
      </div>
      <div class="goods-item">
        <img src="./屏幕截图 2026-03-18 203732.png" alt="REDMI K Pad">
      </div>
      <div class="goods-item">
        <img src="./屏幕截图 2026-03-18 203738.png" alt="Xiaomi Watch S4">
      </div>
    </div>
  </div>
</body>
</html>

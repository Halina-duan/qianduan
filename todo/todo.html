<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,'Microsoft YaHei'}
    body{background: linear-gradient(135deg, #e3f2ff 0%, #b3d9ff 100%);}
    .app{max-width:700px;margin:0 auto}
    .logo{text-align:center;margin:20px 0}
    .logo img{height:65px}
    .card{background:  #b1d6ed;
box-shadow: 0 4px 15px  #b1d6ed;border-radius: 12px;}
    .input-title{width:100%;border:none;font-size:18px;padding:8px;outline:none;margin-bottom:8px;color: #1c4964;border-radius: 8px;background-color: #b5daf1;}
    .input-content{width:100%;border:none;resize:none;height:60px;padding:8px;outline:none;color:#336e66;border-radius: 8px;background-color: #b1d6ed;}
    .row{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
    select,input[type=datetime-local]{padding:8px 8px;border:1px solid #ddd;border-radius:6px;background: #e6f7ff;
border-radius: 8px;}
    .add-btn{background:#89c3e8;color:#191e20;border:none;padding:10px 20px;border-radius:6px;cursor:pointer}
    .filter{display:flex;gap:8px;margin-bottom:165x;flex-wrap:wrap}
    .filter button{padding:6px 12px;border:1px solid #ddd;border-radius:20px;background:#85e7fc;cursor:pointer}
    .filter .active{background:#409eff;color:#fff}
    .todo-item{padding:14px 12px;border-bottom:1px solid #155175;display:flex;align-items:flex-start;gap:10px;border-radius: 8px;}
    .todo-item:last-child{border-bottom:none}
    .checkbox{width:20px;height:20px;margin-top:4px}
    .info{flex:1}
    .title{font-size:16px;font-weight:500;margin-bottom:4px}
    .content{font-size:14px;color:#666;margin-bottom:6px}
    .tags{display:flex;gap:6px;font-size:12px}
    .tag{padding:2px 6px;border-radius:4px;color:#fff}
    .high{background:#4dffc4}
    .medium{background:#faad14}
    .low{background:#52c41a}
    .cate{background:#e6f7ff;color:#1890ff}
    .time{color:#999;font-size:12px;margin-top:6px}
    .action{display:flex;gap:10px;font-size:14px}
    .edit{color:#409eff;cursor:pointer}
    .del{color:#ff4d4f;cursor:pointer}
    .restore{color:#52c41a;cursor:pointer}
    .empty{text-align:center;padding:40px;color:#999}
    .title.done,.content.done{text-decoration:line-through;color:#999}
    .overdue{background:#fff7f7}
    .category{background-color: #abceef;}
    .priority{background-color: #abceef;}
    .row{background:#b5daf1;}
    
  </style>
</head>
<body>
  <div class="app">
    <div class="logo">
      <img src="https://todo.uiineed.com/public/img/todo.svg">
    </div>

    <div class="card">
      <input class="input-title" id="title" placeholder="标题">
      <textarea class="input-content" id="content" placeholder="详细内容"></textarea>
      <div class="row">
        <select id="priority">
          <option value="low">低优先级</option>
          <option value="medium">中优先级</option>
          <option value="high">高优先级</option>
        </select>
        <select id="category">
          <option>生活</option>
          <option>工作</option>
          <option>学习</option>
        </select>
        <input type="datetime-local" id="deadline">
      </div>
      <button class="add-btn" onclick="add()">添加待办</button>
    </div>

    <div class="filter">
      <button class="active" onclick="filter('all')">全部</button>
      <button onclick="filter('active')">未完成</button>
      <button onclick="filter('completed')">已完成</button>
      <button onclick="filter('trash')">回收站</button>
    </div>

    <div class="card" id="list"></div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos')) || []
    let trash = JSON.parse(localStorage.getItem('trash')) || []
    let current = 'all'

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos))
      localStorage.setItem('trash', JSON.stringify(trash))
    }

    function add() {
      const title = document.getElementById('title').value.trim()
      const content = document.getElementById('content').value.trim()
      const priority = document.getElementById('priority').value
      const category = document.getElementById('category').value
      const deadline = document.getElementById('deadline').value
      if (!title) return alert('请输入标题')
      todos.unshift({ id: Date.now(), title, content, priority, category, deadline, done: false })
      document.getElementById('title').value = ''
      document.getElementById('content').value = ''
      document.getElementById('deadline').value = ''
      save()
      render()
    }

    function toggle(id) {
      const item = todos.find(i => i.id === id)
      if (item) item.done = !item.done
      save()
      render()
    }

    function edit(id) {
      const item = todos.find(i => i.id === id)
      if (!item) return
      item.title = prompt('标题', item.title) || item.title
      item.content = prompt('内容', item.content) || item.content
      save()
      render()
    }

    function toTrash(id) {
      const item = todos.find(i => i.id === id)
      if (item) {
        trash.unshift(item)
        todos = todos.filter(i => i.id !== id)
        save()
        render()
      }
    }

    function restore(id) {
      const item = trash.find(i => i.id === id)
      if (item) {
        todos.unshift(item)
        trash = trash.filter(i => i.id !== id)
        save()
        render()
      }
    }

    function del(id) {
      trash = trash.filter(i => i.id !== id)
      save()
      render()
    }

    function filter(type) {
      current = type
      document.querySelectorAll('.filter button').forEach((b, i) => b.classList.toggle('active', i === ['all','active','completed','trash'].indexOf(type)))
      render()
    }

    function render() {
      const list = document.getElementById('list')
      let data = todos
      if (current === 'active') data = todos.filter(i => !i.done)
      if (current === 'completed') data = todos.filter(i => i.done)
      if (current === 'trash') data = trash

      if (data.length === 0) {
        list.innerHTML = '<div class="empty">暂无内容</div>'
        return
      }

      list.innerHTML = data.map(i => {
        if (current === 'trash') {
          return `
            <div class="todo-item">
              <div class="info">
                <div class="title">${i.title}</div>
                <div class="content">${i.content}</div>
                <div class="tags">
                  <span class="tag ${i.priority}">${i.priority==='high'?'高':i.priority==='medium'?'中':'低'}</span>
                  <span class="tag cate">${i.category}</span>
                </div>
              </div>
              <div class="action">
                <span class="restore" onclick="restore(${i.id})">恢复</span>
                <span class="del" onclick="del(${i.id})">删除</span>
              </div>
            </div>
          `
        }
        const over = i.deadline && new Date(i.deadline) < new Date() && !i.done
        return `
          <div class="todo-item ${over?'overdue':''}">
            <input type="checkbox" class="checkbox" ${i.done?'checked':''} onchange="toggle(${i.id})">
            <div class="info">
              <div class="title ${i.done?'done':''}">${i.title}</div>
              <div class="content ${i.done?'done':''}">${i.content}</div>
              <div class="tags">
                <span class="tag ${i.priority}">${i.priority==='high'?'高':i.priority==='medium'?'中':'低'}</span>
                <span class="tag cate">${i.category}</span>
              </div>
              ${i.deadline?`<div class="time">截止：${new Date(i.deadline).toLocaleString()}</div>`:''}
            </div>
            <div class="action">
              <span class="edit" onclick="edit(${i.id})">编辑</span>
              <span class="del" onclick="toTrash(${i.id})">删除</span>
            </div>
          </div>
        `
      }).join('')
    }

    render()
  </script>
</body>
</html>
